<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Random Resim Oyunu</title>
<style>
  body {
    margin: 0;
    background: #111;
    overflow: hidden;
    color: white;
    font-family: Arial;
  }

  #score {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 24px;
  }

  /* Ortadaki resim */
  #centerImage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 300px;
    height: auto;
    display: none;
    border-radius: 10px;
  }
</style>
</head>
<body>

<div id="score">Skor: 0</div>
<img id="centerImage">

<script>
let score = 0;
let scoreText = document.getElementById("score");
let centerImage = document.getElementById("centerImage");

/* RESİMLER (BURAYA EKLEME YAPABİLİRSİN) */
let images = [
  "WhatsApp Image 2026-03-18 at 16.48.01.jpeg",
  "WhatsApp Image 2026-03-18 at 13.50.32.jpeg"
];

function showRandomImage() {
  // Skor artır
  score++;
  scoreText.innerText = "Skor: " + score;

  // Rastgele resim seç
  let randomIndex = Math.floor(Math.random() * images.length);
  let selectedImage = images[randomIndex];

  // Resmi göster
  centerImage.src = selectedImage;
  centerImage.style.display = "block";
}

document.addEventListener("click", showRandomImage);
document.addEventListener("touchstart", showRandomImage);
</script>

</body>
</html>
