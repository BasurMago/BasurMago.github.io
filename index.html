<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Oyun Sistemi</title>
<style>
body { margin:0; font-family:Arial; overflow:hidden; }

#gameArea {
  width:100%; height:100vh;
  position:relative;
  background:url("WhatsApp Image 2026-03-18 at 13.50.32.jpeg");
  background-size:cover;
  background-position:center;
}

/* BUTONLAR */
#gameButtons {
  position:absolute;
  top:10px; right:10px;
  z-index:100;
}
#gameButtons button {
  padding:8px 12px;
  margin-left:5px;
  cursor:pointer;
  border:none;
  border-radius:6px;
}

/* ORTAK */
.game {
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  color:white;
}

/* DOKUNMA */
#tapGame div {
  font-size:26px;
  margin:10px;
  text-shadow:1px 1px 5px black;
}

.smallImage {
  position:absolute;
  width:60px;
  animation:fade 0.5s forwards;
}
@keyframes fade {
  0%{opacity:0;}
  50%{opacity:1;}
  100%{opacity:0;}
}

/* SAYI */
#numberGame {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* REFLEKS */
#reflexGame {
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#reflexBox {
  width:200px;
  height:200px;
  background:red;
  border-radius:10px;
  cursor:pointer;
}

#reflexText {
  margin-top:20px;
  font-size:24px;
}
</style>
</head>

<body>

<div id="gameArea">

<!-- BUTONLAR -->
<div id="gameButtons">
  <button onclick="showTapGame()">Dokunma</button>
  <button onclick="showNumberGame()">Tahmin</button>
  <button onclick="showReflexGame()">Refleks</button>
</div>

<!-- DOKUNMA -->
<div id="tapGame" class="game">
  <div id="score">Skor: 0</div>
  <div id="time">Süre: 10</div>
  <div id="record">Rekor: 0</div>
  <div id="message"></div>
  <audio id="clickSound" src="universfield-playful-failure-310480 (1).mp3"></audio>
  <div>
    <button onclick="setTime(10)">10s</button>
    <button onclick="setTime(20)">20s</button>
    <button onclick="setTime(30)">30s</button>
  </div>
</div>

<!-- SAYI -->
<div id="numberGame" class="game">
  <div>Kalan Hak: <span id="hak"></span></div>
  <input id="ngInput" type="number">
  <button onclick="checkGuess()">Tahmin Et</button>
  <div id="ngMessage"></div>
  <div>Kazanılan Oyun: <span id="ngWins">0</span></div>
  <button id="retryBtn" onclick="retryGame()" style="display:none;">Tekrar Oyna</button>
</div>

<!-- REFLEKS -->
<div id="reflexGame" class="game">
  <div id="reflexBox"></div>
  <div id="reflexText">Hazır ol...</div>
  <div>Rekor: <span id="reflexRecord">0</span> ms</div>
</div>

</div>

<script>
// ================= DOKUNMA =================
let score=0,time=10,timer,isGameOver=false,currentTimeSetting=10;
let clickSound=document.getElementById("clickSound");

function getRecordKey(t){ return "tapRecord_"+t; }
function loadRecord(){
  let r=localStorage.getItem(getRecordKey(currentTimeSetting))||0;
  document.getElementById("record").innerText="Rekor: "+r;
  return r;
}
let record=loadRecord();

function updateDisplay(){
  document.getElementById("score").innerText="Skor: "+score;
  document.getElementById("time").innerText="Süre: "+time;
  document.getElementById("record").innerText="Rekor: "+record;
}

function endGame(){
  isGameOver=true;
  document.getElementById("message").innerText="Bitti! Tekrar tıkla";
  if(score>record){
    record=score;
    localStorage.setItem(getRecordKey(currentTimeSetting),record);
  }
  clearInterval(timer);
}

function handleClick(){
  if(activeGame!=="tap") return;
  if(isGameOver){ startGame(); return; }

  score++; updateDisplay();
  clickSound.currentTime=0;
  clickSound.play();

  let img=document.createElement("img");
  img.src="WhatsApp Image 2026-03-18 at 16.48.01.jpeg";
  img.className="smallImage";

  let area=document.getElementById("tapGame");
  img.style.left=Math.random()*(area.clientWidth-60)+"px";
  img.style.top=Math.random()*(area.clientHeight-60)+"px";

  area.appendChild(img);
  setTimeout(()=>img.remove(),500);
}

function startTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    if(time>0){ time--; updateDisplay(); }
    else endGame();
  },1000);
}

function startGame(){
  score=0;
  isGameOver=false;
  document.getElementById("message").innerText="";
  time=currentTimeSetting;
  updateDisplay();
  startTimer();
}

function setTime(t){
  currentTimeSetting=t;
  record=loadRecord();
  startGame();
}

/* ✅ SADECE BURASI DEĞİŞTİ */
document.getElementById("tapGame").addEventListener("click", handleClick);

// ================= SAYI =================
let number,hak;
let wins = localStorage.getItem("guessWins") || 0;
document.getElementById("ngWins").innerText = wins;

function startNumber(){
  number = Math.floor(Math.random()*100)+1;
  hak = 5;
  document.getElementById("hak").innerText = hak;
  document.getElementById("ngMessage").innerText = "";
  document.getElementById("ngInput").value = "";
  document.getElementById("retryBtn").style.display = "none";
}

function checkGuess(){
  if(hak<=0) return;
  let g = parseInt(document.getElementById("ngInput").value);
  hak--;
  document.getElementById("hak").innerText = hak;

  if(g === number){
    document.getElementById("ngMessage").innerText="🎉 Tebrikler!";
    wins++;
    localStorage.setItem("guessWins", wins);
    document.getElementById("ngWins").innerText = wins;
    document.getElementById("retryBtn").style.display="block";
    hak=0;
  } else if(hak===0){
    document.getElementById("ngMessage").innerText="❌ Kaybettin! Sayı: "+number;
    document.getElementById("retryBtn").style.display="block";
  } else if(g<number){
    document.getElementById("ngMessage").innerText="Daha büyük";
  } else {
    document.getElementById("ngMessage").innerText="Daha küçük";
  }
}

function retryGame(){
  startNumber();
}

// ================= REFLEKS =================
let reflexStartTime;
let waiting = true;
let bestTime = localStorage.getItem("reflexBest") || null;
document.getElementById("reflexRecord").innerText = bestTime ? bestTime : 0;

function startReflex(){
  let box = document.getElementById("reflexBox");
  let text = document.getElementById("reflexText");
  box.style.background = "red";
  text.innerText = "Hazır ol...";
  waiting = true;
  let delay = Math.random()*3000 + 2000;

  setTimeout(()=>{
    box.style.background = "green";
    text.innerText = "TIKLA!";
    reflexStartTime = new Date().getTime();
    waiting = false;
  }, delay);
}

document.getElementById("reflexBox").onclick = function(){
  if(activeGame!=="reflex") return;
  let text=document.getElementById("reflexText");

  if(waiting){
    text.innerText = "❌ Çok erken! Kaybettin.";
    startReflex();
    return;
  }

  let time = new Date().getTime() - reflexStartTime;
  if(!bestTime || time < bestTime){
    bestTime = time;
    localStorage.setItem("reflexBest", bestTime);
    document.getElementById("reflexRecord").innerText = bestTime;
  }

  text.innerText = "Süre: "+time+" ms | Rekor: "+bestTime+" ms";
  startReflex();
};

// ================= OYUN YÖNETİMİ =================
let activeGame="";
function hideAll(){
  document.querySelectorAll(".game").forEach(g=>g.style.display="none");
}

function showTapGame(){
  hideAll();
  document.getElementById("gameArea").style.backgroundImage='url("WhatsApp Image 2026-03-18 at 13.50.32.jpeg")';
  document.getElementById("tapGame").style.display="block";
  activeGame="tap";
  startGame();
}

/* ✅ SADECE BURASI DEĞİŞTİ */
function showNumberGame(){
  hideAll();
  document.getElementById("gameArea").style.backgroundImage='url("file_0000000089c0720ab5442ef2ce9b92ce.png")';
  document.getElementById("numberGame").style.display="flex";
  activeGame="number";
  startNumber();
}

function showReflexGame(){
  hideAll();
  document.getElementById("gameArea").style.backgroundImage='url("WhatsApp Image 2026-03-18 at 16.48.01.jpeg")';
  document.getElementById("reflexGame").style.display="flex";
  activeGame="reflex";
  startReflex();
}

window.onload = ()=>showTapGame();

</script>
</body>
</html>
