<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Oyun Sistemi</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#gameArea {
  width: 100%;
  height: 100vh;
  position: relative;
  background: url("WhatsApp Image 2026-03-18 at 13.50.32.jpeg");
  background-size: cover;
  background-position: center;
}

/* Butonlar */
#gameButtons {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 100;
}

#gameButtons button {
  margin-left: 5px;
  padding: 8px 12px;
  font-size: 16px;
  cursor: pointer;
}

/* Dokunma oyunu */
#tapGame {
  width: 100%;
  height: 100%;
  position: absolute;
}

#tapGame #score, #tapGame #time, #tapGame #record {
  font-size: 28px;
  margin: 10px;
  color: white;
  text-shadow: 1px 1px 5px black;
}

#tapGame #message {
  font-size: 24px;
  color: lime;
}

/* Sayı tahmin oyunu */
#numberGame {
  width: 100%;
  height: 100%;
  position: absolute;
  display: none;
  color: white;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#numberGame input {
  padding: 10px;
  font-size: 20px;
  width: 100px;
  text-align: center;
}

#numberGame button {
  padding: 8px 16px;
  font-size: 18px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="gameArea">

  <div id="gameButtons">
    <button onclick="showTapGame()">Dokunma Oyunu</button>
    <button onclick="showNumberGame()">Sayı Tahmin Oyunu</button>
  </div>

  <!-- Dokunma Oyunu -->
  <div id="tapGame">
    <div id="score">Skor: 0</div>
    <div id="time">Süre: 10</div>
    <div id="record">Rekor: 0</div>
    <div id="message"></div>
  </div>

  <!-- Sayı Tahmin Oyunu -->
  <div id="numberGame">
    <div>1-100 arası sayı tahmin et</div>
    <div id="hak">Kalan Hak: 5</div>
    <input type="number" id="ngInput">
    <button onclick="checkGuess()">Tahmin Et</button>
    <div id="ngMessage"></div>
  </div>

</div>

<script>
// ===== Dokunma Oyunu =====
let score = 0;
let time = 10;
let timer;
let isGameOver = false;

function startGame() {
  score = 0;
  time = 10;
  isGameOver = false;
  updateDisplay();
  clearInterval(timer);
  timer = setInterval(() => {
    if(time > 0){
      time--;
      updateDisplay();
    } else {
      document.getElementById("message").innerText = "Bitti!";
      isGameOver = true;
      clearInterval(timer);
    }
  },1000);
}

function updateDisplay(){
  document.getElementById("score").innerText = "Skor: " + score;
  document.getElementById("time").innerText = "Süre: " + time;
}

document.addEventListener("click", function(){
  if(document.getElementById("tapGame").style.display !== "none"){
    if(!isGameOver){
      score++;
      updateDisplay();
    } else {
      startGame();
    }
  }
});

// ===== Sayı Tahmin Oyunu =====
let numberToGuess;
let hak;

function startNumberGame(){
  numberToGuess = Math.floor(Math.random()*100)+1;
  hak = 5;
  document.getElementById("hak").innerText = "Kalan Hak: " + hak;
  document.getElementById("ngMessage").innerText = "";
  document.getElementById("ngInput").value = "";
}

function checkGuess(){
  let guess = parseInt(document.getElementById("ngInput").value);
  let msg = document.getElementById("ngMessage");

  if(hak <= 0) return;

  hak--;
  document.getElementById("hak").innerText = "Kalan Hak: " + hak;

  if(guess === numberToGuess){
    msg.innerText = "🎉 Tebrikler bildin!";
    hak = 0;
  } else if(hak === 0){
    msg.innerText = "❌ Kaybettiniz! Sayı: " + numberToGuess;
  } else if(guess < numberToGuess){
    msg.innerText = "Daha büyük!";
  } else {
    msg.innerText = "Daha küçük!";
  }
}

// ===== Oyun Değiştirme =====
function showTapGame(){
  document.getElementById("tapGame").style.display = "block";
  document.getElementById("numberGame").style.display = "none";
  startGame();
}

function showNumberGame(){
  document.getElementById("tapGame").style.display = "none";
  document.getElementById("numberGame").style.display = "flex";
  startNumberGame();
}

// SAYFA AÇILINCA SADECE DOKUNMA OYUNU
window.onload = function(){
  showTapGame();
};
</script>

</body>
</html>
