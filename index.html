<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dokunma Oyunu</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    user-select: none;
  }

  #score, #time, #record {
    font-size: 28px;
    margin: 10px;
  }

  #message {
    font-size: 24px;
    margin-top: 20px;
    color: lime;
  }
</style>
</head>
<body>

<div id="score">Skor: 0</div>
<div id="time">Süre: 10</div>
<div id="record">Rekor: 0</div>
<div id="message"></div>

<script>
let score = 0;
let time = 10; // süre saniye
let timer;
let isGameOver = false;

// Rekoru localStorage'dan al
let record = localStorage.getItem("tapRecord") || 0;
document.getElementById("record").innerText = "Rekor: " + record;

function updateDisplay() {
  document.getElementById("score").innerText = "Skor: " + score;
  document.getElementById("time").innerText = "Süre: " + time;
  document.getElementById("record").innerText = "Rekor: " + record;
}

function endGame() {
  isGameOver = true;
  document.getElementById("message").innerText = "Oyun bitti! Tıkla tekrar başlatmak için.";
  // Rekoru kaydet
  if (score > record) {
    record = score;
    localStorage.setItem("tapRecord", record);
    updateDisplay();
  }
}

// Başlat veya tıklama
function handleClick() {
  if (isGameOver) {
    // Resetle
    score = 0;
    time = 10;
    isGameOver = false;
    document.getElementById("message").innerText = "";
    updateDisplay();
    startTimer();
    return;
  }

  score++;
  updateDisplay();
}

// Zamanlayıcı
function startTimer() {
  timer = setInterval(() => {
    if (time > 0) {
      time--;
      updateDisplay();
    } else {
      clearInterval(timer);
      endGame();
    }
  }, 1000);
}

// Etkinlikler
document.addEventListener("click", handleClick);
document.addEventListener("touchstart", handleClick);

// Başlat
startTimer();
</script>

</body>
</html>
