<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title><style>
body { margin:0; overflow:hidden; background:#70c5ce; }
canvas { display:block; }
</style></head><body>
<canvas id="game"></canvas><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// KUŞ
let bird = {
  x: 100,
  y: 200,
  size: 20,
  velocity: 0,
  gravity: 0.5,
  lift: -8
};

// OYUN
let pipes = [];
let gap = 150;
let speed = 3;
let frame = 0;
let score = 0;
let gameOver = false;

// KONTROL
function flap(){
  if(gameOver){
    location.reload();
  }
  bird.velocity = bird.lift;
}

document.addEventListener("click", flap);
document.addEventListener("touchstart", flap);
document.addEventListener("keydown", e=>{
  if(e.code === "Space") flap();
});

// LOOP
function update(){

  ctx.fillStyle = "#70c5ce";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // KUŞ
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  ctx.fillStyle = "yellow";
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI*2);
  ctx.fill();

  // BORU
  if(frame % 90 === 0){
    let top = Math.random() * (canvas.height - gap - 100) + 50;
    pipes.push({
      x: canvas.width,
      top: top,
      bottom: top + gap,
      passed: false
    });
  }

  pipes.forEach(p => {
    p.x -= speed;

    ctx.fillStyle = "green";
    ctx.fillRect(p.x, 0, 50, p.top);
    ctx.fillRect(p.x, p.bottom, 50, canvas.height);

    // çarpışma
    if(
      bird.x + bird.size > p.x &&
      bird.x - bird.size < p.x + 50 &&
      (bird.y - bird.size < p.top || bird.y + bird.size > p.bottom)
    ){
      gameOver = true;
    }

    // skor
    if(!p.passed && p.x < bird.x){
      score++;
      p.passed = true;
    }
  });

  if(bird.y > canvas.height || bird.y < 0){
    gameOver = true;
  }

  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText("Skor: " + score, 20, 40);

  if(gameOver){
    ctx.fillStyle = "red";
    ctx.font = "50px Arial";
    ctx.fillText("GAME OVER", canvas.width/2 - 150, canvas.height/2);
    return;
  }

  frame++;
  requestAnimationFrame(update);
}

update();
</script></body>
</html>
