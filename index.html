<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dokunma Oyunu</title>
<style>
  body {
    margin: 0;
    background: url("WhatsApp Image 2026-03-18 at 13.50.32.jpeg");
    background-size: cover;
    background-position: center;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
  }

  /* Sol kenar panel */
  #menu {
    width: 150px;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }

  button {
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }

  /* Orta oyun alanı */
  #gameArea {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  #score, #time, #record {
    font-size: 28px;
    margin: 10px;
    text-shadow: 1px 1px 5px black;
  }

  #message {
    font-size: 24px;
    margin-top: 20px;
    color: lime;
    text-shadow: 1px 1px 5px black;
  }
</style>
</head>
<body>

<div id="menu">
  <div>Oyun Süresi</div>
  <button onclick="setTime(10)">10s</button>
  <button onclick="setTime(20)">20s</button>
  <button onclick="setTime(30)">30s</button>
</div>

<div id="gameArea">
  <div id="score">Skor: 0</div>
  <div id="time">Süre: 10</div>
  <div id="record">Rekor: 0</div>
  <div id="message"></div>
</div>

<script>
let score = 0;
let time = 10;
let timer;
let isGameOver = false;

// Rekoru localStorage'dan al
let record = localStorage.getItem("tapRecord") || 0;
document.getElementById("record").innerText = "Rekor: " + record;

function updateDisplay() {
  document.getElementById("score").innerText = "Skor: " + score;
  document.getElementById("time").innerText = "Süre: " + time;
  document.getElementById("record").innerText = "Rekor: " + record;
}

function endGame() {
  isGameOver = true;
  document.getElementById("message").innerText = "Oyun bitti! Tıkla tekrar başlatmak için.";
  if (score > record) {
    record = score;
    localStorage.setItem("tapRecord", record);
    updateDisplay();
  }
  clearInterval(timer); // timer durdur
}

function handleClick() {
  if (isGameOver) {
    startGame();
    return;
  }
  score++;
  updateDisplay();
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    if (time > 0) {
      time--;
      updateDisplay();
    } else {
      endGame();
    }
  }, 1000);
}

// Oyun başlat
function startGame() {
  score = 0;
  isGameOver = false;
  document.getElementById("message").innerText = "";
  updateDisplay();
  startTimer();
}

// Süre seçimi
function setTime(t) {
  time = t;
  startGame(); // süre değişince oyun sıfırlansın ve başlasın
}

// Etkinlikler
document.addEventListener("click", handleClick);
document.addEventListener("touchstart", handleClick);
</script>

</body>
</html>
