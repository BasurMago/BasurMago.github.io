<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Oyun Sistemi</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  overflow: hidden;
}

#gameArea {
  width: 100%;
  height: 100vh;
  position: relative;
  background: url("WhatsApp Image 2026-03-18 at 13.50.32.jpeg");
  background-size: cover;
}

/* Butonlar */
#gameButtons {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 100;
}

#gameButtons button {
  margin-left: 5px;
  padding: 8px;
  cursor: pointer;
}

/* Ortak */
.game {
  position: absolute;
  width: 100%;
  height: 100%;
  display: none;
  color: white;
}

/* Dokunma */
#tapGame div {
  font-size: 24px;
  margin: 10px;
}

/* Sayı */
#numberGame {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* Sudoku */
#sudokuGame {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#sudokuBoard {
  display: grid;
  grid-template-columns: repeat(9, 40px);
  gap: 2px;
}

#sudokuBoard input {
  width: 40px;
  height: 40px;
  text-align: center;
  font-size: 18px;
}
</style>
</head>
<body>

<div id="gameArea">

<div id="gameButtons">
  <button onclick="showTapGame()">Dokunma</button>
  <button onclick="showNumberGame()">Tahmin</button>
  <button onclick="showSudoku()">Sudoku</button>
</div>

<!-- Dokunma -->
<div id="tapGame" class="game">
  <div id="score">Skor: 0</div>
  <div id="time">Süre: 10</div>
</div>

<!-- Sayı -->
<div id="numberGame" class="game">
  <div>Kalan Hak: <span id="hak"></span></div>
  <input id="ngInput" type="number">
  <button onclick="checkGuess()">Tahmin</button>
  <div id="ngMessage"></div>
</div>

<!-- Sudoku -->
<div id="sudokuGame" class="game">
  <div>
    <button onclick="generateSudoku('easy')">Kolay</button>
    <button onclick="generateSudoku('medium')">Orta</button>
    <button onclick="generateSudoku('hard')">Zor</button>
  </div>
  <div id="sudokuBoard"></div>
</div>

</div>

<script>
// ===== Dokunma =====
let score=0,time=10,timer;
function startTap(){
  score=0; time=10;
  clearInterval(timer);
  timer=setInterval(()=>{time--;updateTap(); if(time<=0)clearInterval(timer)},1000);
}
function updateTap(){
  score++;
  document.getElementById("score").innerText="Skor: "+score;
  document.getElementById("time").innerText="Süre: "+time;
}
document.addEventListener("click",()=> {
  if(activeGame==="tap") updateTap();
});

// ===== Tahmin =====
let number,hak;
function startNumber(){
  number=Math.floor(Math.random()*100)+1;
  hak=5;
  document.getElementById("hak").innerText=hak;
  document.getElementById("ngMessage").innerText="";
}
function checkGuess(){
  if(hak<=0) return;
  let g=parseInt(document.getElementById("ngInput").value);
  hak--;
  document.getElementById("hak").innerText=hak;
  if(g===number){
    document.getElementById("ngMessage").innerText="Tebrikler!";
    hak=0;
  } else if(hak===0){
    document.getElementById("ngMessage").innerText="Kaybettin! "+number;
  } else if(g<number){
    document.getElementById("ngMessage").innerText="Daha büyük";
  } else {
    document.getElementById("ngMessage").innerText="Daha küçük";
  }
}

// ===== Sudoku =====
function generateSudoku(level){
  const board=document.getElementById("sudokuBoard");
  board.innerHTML="";
  let emptyCount = level==="easy"?30: level==="medium"?45:55;

  for(let i=0;i<81;i++){
    let input=document.createElement("input");
    if(Math.random()*81 < emptyCount){
      input.value="";
    } else {
      input.value=Math.floor(Math.random()*9)+1;
      input.disabled=true;
    }
    board.appendChild(input);
  }
}

// ===== Oyun Yönetimi =====
let activeGame="";

function hideAll(){
  document.querySelectorAll(".game").forEach(g=>g.style.display="none");
}

function showTapGame(){
  hideAll();
  document.getElementById("gameArea").style.background='url("WhatsApp Image 2026-03-18 at 13.50.32.jpeg")';
  document.getElementById("tapGame").style.display="block";
  activeGame="tap";
  startTap();
}

function showNumberGame(){
  hideAll();
  document.getElementById("gameArea").style.background='url("WhatsApp Image 2026-03-18 at 13.50.32.jpeg")';
  document.getElementById("numberGame").style.display="flex";
  activeGame="number";
  startNumber();
}

function showSudoku(){
  hideAll();
  document.getElementById("gameArea").style.background='url("WhatsApp Image 2026-03-18 at 16.48.01.jpeg")';
  document.getElementById("sudokuGame").style.display="flex";
  activeGame="sudoku";
  generateSudoku("easy");
}

// BAŞLANGIÇ
window.onload=()=>showTapGame();
</script>

</body>
</html>
