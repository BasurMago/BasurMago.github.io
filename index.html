<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Blast</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
canvas { display:block; background: url('WhatsApp Image 2026-03-18 at 13.50.32.jpeg') no-repeat center/cover; }#gameOverScreen {
position:absolute;
top:0; left:0;
width:100%; height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
color:white;
text-align:center;
background: url('WhatsApp Image 2026-03-18 at 16.48.01.jpeg') no-repeat center/cover;
z-index:10;
display:none;
flex-direction: column;
}
#gameOverScreen button {
margin-top:20px;
padding:10px 20px;
font-size:25px;
cursor:pointer;
}
</style>

</head>
<body>
<canvas id="game"></canvas>
<div id="gameOverScreen">
  <div>GAME OVER</div>
  <button onclick="restartGame()">Yeniden Başlat</button>
</div><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const gameOverScreen = document.getElementById("gameOverScreen");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// GRID
const ROWS = 8;
const COLS = 8;
const grid = Array.from({length:ROWS}, ()=>Array(COLS).fill(null));
const blockSize = Math.min(canvas.width/COLS, canvas.height/ROWS) - 5;

// BLOKLAR
const colors = ["red","orange","yellow","green","blue","purple"];

// SKOR
let score = 0;
let highScore = localStorage.getItem("highscore") || 0;

// OYUN DURUMU
let gameOver = false;
let selectedBlock = null;

// RANDOM BLOK ÜRET
function getRandomBlock(){
  const color = colors[Math.floor(Math.random()*colors.length)];
  const w = Math.floor(Math.random()*3)+1; // 1-3 genişlik
  const h = Math.floor(Math.random()*3)+1; // 1-3 yükseklik
  return {color,w,h};
}

// Seçili blokları hazırla
let nextBlocks = [getRandomBlock(), getRandomBlock(), getRandomBlock()];

// Çizim
function drawGrid(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(grid[r][c]){
        ctx.fillStyle = grid[r][c];
        ctx.fillRect(c*blockSize,r*blockSize,blockSize-2,blockSize-2);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        ctx.fillRect(c*blockSize,r*blockSize,blockSize-2,blockSize-2);
      }
    }
  }
}

// Çizim + skor
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
  ctx.fillStyle = "white";
  ctx.font = "25px Arial";
  ctx.fillText("Skor: "+score, 20,30);
  ctx.fillText("Rekor: "+highScore, 20,60);
}

// Satır/sütun temizleme
function checkClear(){
  for(let r=0;r<ROWS;r++){
    if(grid[r].every(cell=>cell)){
      for(let c=0;c<COLS;c++) grid[r][c]=null;
      score+=COLS;
    }
  }
  for(let c=0;c<COLS;c++){
    let full = true;
    for(let r=0;r<ROWS;r++){
      if(!grid[r][c]) full=false;
    }
    if(full){
      for(let r=0;r<ROWS;r++) grid[r][c]=null;
      score+=ROWS;
    }
  }
  if(score>highScore){
    highScore=score;
    localStorage.setItem("highscore",highScore);
  }
}

// Yerleştirme kontrol
function canPlaceBlock(block, row, col){
  if(row+block.h>ROWS || col+block.w>COLS) return false;
  for(let r=0;r<block.h;r++){
    for(let c=0;c<block.w;c++){
      if(grid[row+r][col+c]) return false;
    }
  }
  return true;
}

function placeBlock(block, row, col){
  for(let r=0;r<block.h;r++){
    for(let c=0;c<block.w;c++){
      grid[row+r][col+c]=block.color;
    }
  }
  checkClear();
}

// Mouse / touch
canvas.addEventListener("click", e=>{
  if(gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX-rect.left;
  const y = e.clientY-rect.top;
  const col = Math.floor(x/blockSize);
  const row = Math.floor(y/blockSize);
  const block = nextBlocks[0];
  if(canPlaceBlock(block,row,col)){
    placeBlock(block,row,col);
    nextBlocks.shift();
    nextBlocks.push(getRandomBlock());
  } else {
    gameOver=true;
    gameOverScreen.style.display="flex";
  }
});

// Game Loop
function loop(){
  draw();
  if(!gameOver) requestAnimationFrame(loop);
}

loop();

function restartGame(){
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) grid[r][c]=null;
  score=0;
  nextBlocks=[getRandomBlock(),getRandomBlock(),getRandomBlock()];
  gameOver=false;
  gameOverScreen.style.display="none";
  loop();
}
</script></body>
</html>
