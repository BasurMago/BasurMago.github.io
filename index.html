<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird Gelişmiş</title><style>
body { margin:0; overflow:hidden; }
canvas { display:block; }

#gameOverScreen {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:50px;
  color:white;
  text-align:center;
  background: url('WhatsApp Image 2026-03-18 at 16.48.01.jpeg') no-repeat center/cover;
  z-index:10;
  display:none;
}
</style></head><body>
<canvas id="game"></canvas>
<div id="gameOverScreen">GAME OVER<br>Tıklayarak tekrar başla</div><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const gameOverScreen = document.getElementById("gameOverScreen");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Arka plan
const bgImg = new Image();
bgImg.src = 'WhatsApp Image 2026-03-18 at 13.50.32.jpeg';

// Kuş
let bird = {
  x: 100,
  y: canvas.height/2,
  size: 25,
  velocity: 0,
  gravity: 0.25,   // daha yavaş düşüş
  lift: -7         // daha yumuşak zıplama
};

// Borular
let pipes = [];
let gap = 200;       // duvar aralığı arttı
let speed = 2.5;
let frame = 0;
let score = 0;
let highScore = localStorage.getItem("highscore") || 0;
let gameOver = false;

// Kontrol (PC + mobil)
function flap(){
  if(gameOver){
    location.reload();
  }
  bird.velocity = bird.lift;
}

document.addEventListener("click", flap);
document.addEventListener("touchstart", flap);
document.addEventListener("keydown", e=>{
  if(e.code === "Space") flap();
});

function update(){

  // Arka plan
  ctx.drawImage(bgImg,0,0,canvas.width,canvas.height);

  // Kuş
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  ctx.fillStyle="yellow";
  ctx.beginPath();
  ctx.arc(bird.x, bird.y, bird.size, 0, Math.PI*2);
  ctx.fill();

  // Boru oluşturma
  if(frame % 100 === 0){
    let top = Math.random() * (canvas.height - gap - 100) + 50;
    pipes.push({
      x: canvas.width,
      top: top,
      bottom: top + gap,
      passed: false
    });
  }

  // Boruları çiz ve çarpışma
  pipes.forEach(p=>{
    p.x -= speed;

    ctx.fillStyle="green";
    ctx.fillRect(p.x, 0, 60, p.top);
    ctx.fillRect(p.x, p.bottom, 60, canvas.height);

    // Çarpışma
    if(bird.x + bird.size > p.x &&
       bird.x - bird.size < p.x + 60 &&
       (bird.y - bird.size < p.top || bird.y + bird.size > p.bottom)){
         gameOver = true;
    }

    // Skor
    if(!p.passed && p.x + 60 < bird.x){
      score++;
      p.passed = true;
      if(score > highScore){
        highScore = score;
        localStorage.setItem("highscore", highScore);
      }
    }
  });

  if(bird.y > canvas.height || bird.y < 0){
    gameOver = true;
  }

  // Skor
  ctx.fillStyle="white";
  ctx.font="30px Arial";
  ctx.fillText("Skor: "+score, 20,40);
  ctx.fillText("Rekor: "+highScore, 20,80);

  // Game Over
  if(gameOver){
    gameOverScreen.style.display = "flex";
    return;
  }

  frame++;
  requestAnimationFrame(update);
}

update();
</script></body>
</html>
