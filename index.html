<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Dokunma Oyunu</title>
<style>
  body {
    margin: 0;
    background: #111;
    overflow: hidden;
    color: white;
    font-family: Arial;
  }

  /* Skor yazısı */
  #score {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 24px;
  }

  /* Resimlerin çıkacağı alan */
  #container {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .mini {
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 5px;
  }
</style>
</head>
<body>

<div id="score">Skor: 0</div>
<div id="container"></div>

<script>
let container = document.getElementById("container");
let scoreText = document.getElementById("score");

let score = 0;

function addImage() {
  // Skor artır
  score++;
  scoreText.innerText = "Skor: " + score;

  // Resim ekle
  let img = document.createElement("img");
  img.src = "WhatsApp Image 2026-03-18 at 16.48.01.jpeg";
  img.className = "mini";
  container.appendChild(img);
}

document.addEventListener("click", addImage);
document.addEventListener("touchstart", addImage);
</script>

</body>
</html>
